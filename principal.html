<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SIT-Mototaxis (Sistema Integrado de Transporte de Mototaxis)</title>
  <link rel="stylesheet" href="css/general.css">
  
</head>
<body>

  <header class="navbar">
    <h1>SIT-Mototaxis (Sistema Integrado de Transporte de Mototaxis)</h1>
    <div>
      <span id="user-display" style="margin-right: 15px; color: #cbd5e1;"></span>
      <button id="btn-logout" class="logout-btn">Cerrar Sesión</button>
    </div>
  </header>

  <div class="main-wrapper">

   <!-- Menú Lateral Morado Oscuro -->
<aside class="sidebar">
  <ul>
    <li><a href="principal.html" id="nav-registrar"> Registrar Mototaxi</a></li>
    <li><a href="reporte.html" id="nav-reportes"> Reportes y Estadísticas</a></li>
    <li><a href="configuracion.html" id="nav-config">⚙️ Configuración</a></li>
  </ul>
</aside>

    <main class="content">
      <h2>Registro de Mototaxis Autorizados</h2>
      
      <div class="form-container">
        <h3>Datos Generales</h3>
        <form id="registro-moto-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="nombre-prop">Nombre Completo del Propietario</label>
              <input type="text" id="nombre-prop" required placeholder="Ej. Juan Pérez">
            </div>
            <div class="form-group">
              <label for="dpi-prop">DPI (Código Único de Identificación)</label>
              <input type="text" id="dpi-prop" required placeholder="Ej. 2514 12345 0101">
            </div>
            <div class="form-group" style="grid-column: span 2;">
              <label for="domicilio-prop">Domicilio Completo</label>
              <input type="text" id="domicilio-prop" required placeholder="Dirección residencial en San Mateo">
            </div>

            <div class="form-group">
              <label for="modelo-moto">Modelo (Año)</label>
              <input type="number" id="modelo-moto" required placeholder="Ej. 2025" min="1990" max="2027">
            </div>
            <div class="form-group">
              <label for="color-moto">Color</label>
              <input type="text" id="color-moto" required placeholder="Ej. Rojo con Blanco">
            </div>
            <div class="form-group">
              <label for="seguro-moto">¿Cuenta con Seguro de Vida?</label>
              <select id="seguro-moto" required>
                <option value="">Seleccione una opción</option>
                <option value="Sí">Sí, Cobertura Activa</option>
                <option value="No">No Vigente</option>
              </select>
            </div>
            <div class="form-group">
              <label for="municipio">Municipio de Circulación</label>
              <select id="municipio" required>
                <option value="San Mateo">San Mateo (Central)</option>
                <option value="Quetzaltenango">Quetzaltenango Sur</option>
                <option value="Olintepeque">Olintepeque Sector</option>
              </select>
            </div>
          </div>
          <button type="submit" class="submit-btn">Registrar y Generar Matrícula</button>
        </form>
      </div>

      <h3>Unidades Registradas</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Placa Generada</th>
              <th>Propietario</th>
              <th>DPI</th>
              <th>Modelo/Color</th>
              <th>Seguro</th>
              <th>Municipio</th>
            </tr>
          </thead>
          <tbody id="tabla-motos-body">
            <tr>
        <td colspan="6" style="text-align:center; color:#94a3b8;">Cargando unidades...</td>
      </tr>
            </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="js/principal.js"></script>
</body>
</html>
