<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SIT-Mototaxis Iniciar Sesión</title>
  <link rel="stylesheet" href="css/login.css">
  <style>
    /* Estilos básicos para el spinner de carga */
    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid #007bff; /* Color del spinner */
      width: 20px;
      height: 20px;
      -webkit-animation: spin 1s linear infinite; /* Safari */
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 10px;
      display: none; /* Oculto por defecto */
    }

    /* Animación para el spinner */
    @-webkit-keyframes spin {
      0% { -webkit-transform: rotate(0deg); }
      100% { -webkit-transform: rotate(360deg); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Ajustes para el botón cuando hay spinner */
    button.loading {
        position: relative;
        pointer-events: none; /* Deshabilita clics */
        opacity: 0.7;
    }
    button.loading .loading-spinner {
        display: inline-block;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>SIT-Mototaxis</h2>
    <form id="login-form">
      <p id="form-title">Iniciar Sesión</p>
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="usuario@gmail.com">
      </div>
      <div class="input-group">
  <label for="password">Contraseña</label>
  <div class="password-container">
    <input type="password" id="password" required placeholder="••••••••">
    <span class="toggle-password-btn" data-target="password">Mostrar</span>
  </div>
</div>

<div class="input-group" id="confirm-password-group" style="display: none;">
  <label for="confirm-password">Confirmar Contraseña</label>
  <div class="password-container">
    <input type="password" id="confirm-password" placeholder="••••••••">
    <span class="toggle-password-btn" data-target="confirm-password">Mostrar</span>
  </div>
</div>


      <button type="submit" id="main-button">
        Iniciar Sesión
        <span class="loading-spinner"></span>
      </button>
      <div id="error-message" class="error-msg"></div>

      <p class="toggle-mode-text">
        ¿No tienes una cuenta? <a href="#" id="toggle-register-login">Regístrate aquí</a>
      </p>
      <p class="toggle-mode-text" style="display: none;">
        ¿Ya tienes una cuenta? <a href="#" id="toggle-login-register">Inicia Sesión</a>
      </p>
   
    </form>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
